<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episode Hotel | Welcome to the Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        tech: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        episode: {
                            dark: '#0D1412', // Deep room green shadow
                            green: '#2A3B36', // Room wall green
                            gold: '#EAB308', // Headboard warm yellow/gold
                            glass: 'rgba(20, 30, 26, 0.6)', // Frosted green glass
                        }
                    },
                    animation: {
                        'slow-pan': 'pan 20s linear infinite',
                        'pulse-glow': 'pulseGlow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        pan: {
                            '0%, 100%': { backgroundPosition: 'center' },
                            '50%': { backgroundPosition: 'bottom' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 1, transform: 'scale(1)' },
                            '50%': { opacity: .7, transform: 'scale(1.05)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0D1412; overflow-x: hidden; }
        .bg-cinematic {
            background-image: url('https://i.ibb.co/LtbC3qP/room.jpg');
            background-size: cover;
            background-position: center;
        }
        /* Advanced Glassmorphism */
        .glass-panel {
            background: rgba(13, 20, 18, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        /* Custom thin scrollbar if needed */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #EAB308; }
    </style>
</head>
<body class="text-white antialiased h-screen flex flex-col font-sans selection:bg-episode-gold selection:text-black">

    <!-- HERO BACKGROUND WITH VIGNETTE -->
    <div class="fixed inset-0 z-0 bg-cinematic animate-slow-pan scale-105 transition-transform duration-[20s]"></div>
    <div class="fixed inset-0 z-0 bg-gradient-to-t from-[#0D1412] via-transparent to-[#0D1412]/80 mix-blend-multiply"></div>
    <div class="fixed inset-0 z-0 bg-black/20"></div> <!-- Slight darkening for contrast -->

    <!-- ================= TOP NAVIGATION (Sleek, Minimal) ================= -->
    <header class="relative z-20 flex justify-between items-center px-8 md:px-16 py-8 w-full">
        <div class="font-tech text-3xl font-bold tracking-[0.2em] text-white flex items-center gap-3">
            EPISODE
            <span class="w-2 h-2 rounded-full bg-episode-gold animate-pulse-glow"></span>
        </div>

        <nav class="hidden md:flex gap-10 font-tech text-xs tracking-widest uppercase text-white/70">
            <a href="#" class="hover:text-episode-gold transition-colors duration-300">The Space</a>
            <a href="#" class="hover:text-episode-gold transition-colors duration-300">Technology</a>
            <a href="#" class="hover:text-episode-gold transition-colors duration-300">Location</a>
        </nav>

        <button class="font-tech text-xs tracking-widest uppercase border border-white/20 px-6 py-3 hover:bg-white hover:text-black transition-all duration-300">
            Guest Portal
        </button>
    </header>

    <!-- ================= MAIN CINEMATIC TYPOGRAPHY ================= -->
    <main class="relative z-10 flex-grow flex flex-col justify-center px-8 md:px-16 w-full max-w-7xl mx-auto">
        
        <div class="max-w-3xl">
            <p class="font-tech text-episode-gold uppercase tracking-[0.3em] text-sm mb-6 flex items-center gap-4">
                <span class="w-8 h-[1px] bg-episode-gold"></span>
                First Georgian Tech Hotel
            </p>
            
            <h1 class="font-tech text-6xl md:text-8xl font-light leading-[1.1] tracking-tight mb-8">
                Your <br>
                <span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-white/50">Smart Habitat.</span>
            </h1>

            <p class="text-white/60 text-lg md:text-xl font-light max-w-xl leading-relaxed">
                Bypass the front desk. Unlock your room with your phone. Meet our 3D Multilingual Concierge. This is hospitality, re-engineered.
            </p>
        </div>

    </main>

    <!-- ================= THE "COMMAND CENTER" BOOKING PANEL (Bottom OS Style) ================= -->
    <div class="relative z-20 w-full glass-panel pb-8 pt-8 px-8 md:px-16">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-end md:items-center justify-between gap-8">
            
            <!-- Dates & Guests Container -->
            <div class="flex flex-col md:flex-row gap-8 w-full md:w-auto">
                
                <!-- Input Group: Arrival -->
                <div class="group cursor-pointer">
                    <label class="font-tech text-[10px] text-white/50 uppercase tracking-[0.2em] block mb-2 group-hover:text-episode-gold transition-colors">Arrival Date</label>
                    <div class="text-2xl font-light border-b border-white/20 pb-2 group-hover:border-episode-gold transition-colors min-w-[140px]">
                        Oct 24, 2024
                    </div>
                </div>

                <!-- Input Group: Departure -->
                <div class="group cursor-pointer">
                    <label class="font-tech text-[10px] text-white/50 uppercase tracking-[0.2em] block mb-2 group-hover:text-episode-gold transition-colors">Departure Date</label>
                    <div class="text-2xl font-light border-b border-white/20 pb-2 group-hover:border-episode-gold transition-colors min-w-[140px]">
                        Oct 28, 2024
                    </div>
                </div>

                <!-- Input Group: Guests -->
                <div class="group cursor-pointer">
                    <label class="font-tech text-[10px] text-white/50 uppercase tracking-[0.2em] block mb-2 group-hover:text-episode-gold transition-colors">Occupancy</label>
                    <div class="text-2xl font-light border-b border-white/20 pb-2 group-hover:border-episode-gold transition-colors min-w-[140px]">
                        2 Guests
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button class="w-full md:w-auto bg-episode-gold text-black font-tech uppercase tracking-widest text-sm font-bold px-10 py-5 hover:bg-white transition-all duration-300 flex items-center justify-center gap-3">
                Initialize Booking
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
            
        </div>
    </div>

    <!-- ================= 3D AI CONCIERGE INTEGRATION (Right Side Floating) ================= -->
    <div class="fixed top-1/2 right-0 -translate-y-1/2 z-30 group cursor-pointer">
        <!-- Vertical Text -->
        <div class="absolute right-16 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 text-right pr-4 pointer-events-none">
            <p class="font-tech text-episode-gold text-xs uppercase tracking-[0.2em] mb-1">Active Now</p>
            <p class="text-white text-sm whitespace-nowrap">Speak to 3D AI Concierge</p>
        </div>
        
        <!-- AI Orb / Visualizer -->
        <div class="bg-black/40 backdrop-blur-md border border-white/10 p-4 rounded-l-2xl hover:bg-black/60 transition-all duration-300">
            <!-- Simulated Soundwave/Hologram Effect -->
            <div class="relative w-8 h-12 flex items-center justify-center gap-1">
                <div class="w-1 h-3 bg-episode-gold rounded-full animate-[bounce_1s_infinite_100ms]"></div>
                <div class="w-1 h-8 bg-episode-gold rounded-full animate-[bounce_1s_infinite_300ms] shadow-[0_0_10px_#EAB308]"></div>
                <div class="w-1 h-5 bg-episode-gold rounded-full animate-[bounce_1s_infinite_500ms]"></div>
                <div class="w-1 h-2 bg-episode-gold rounded-full animate-[bounce_1s_infinite_700ms]"></div>
            </div>
        </div>
    </div>

</body>
</html>
