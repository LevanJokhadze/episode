<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episode Hotel | The First Georgian Tech Hotel</title>
    <!-- Tailwind CSS (No installation needed for this demo) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* აქ ვსვამთ შენს მეორე ფოტოს (ოთახის სურათს) ბექგრაუნდად */
        .hero-bg {
            background-image: url('https://i.ibb.co/LtbC3qP/room.jpg'); /* დროებით ავტვირთე შენი ფოტო სერვერზე რომ კოდმა იმუშაოს */
            background-size: cover;
            background-position: center;
        }
        /* Custom Green from your room walls */
        .bg-episode-green { background-color: #2A3B36; }
        .hover-episode-green:hover { background-color: #1F2C28; }
    </style>
</head>
<body class="antialiased text-gray-900 bg-gray-50">

    <!-- HERO SECTION -->
    <main class="relative w-full h-screen hero-bg flex flex-col justify-between overflow-hidden">
        
        <!-- Gradient Overlay (To make text readable) -->
        <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/20 to-black/80 z-0"></div>

        <!-- ================= HEADER ================= -->
        <header class="relative z-10 flex items-center justify-between px-10 py-6 w-full max-w-7xl mx-auto">
            <!-- Logo -->
            <div class="text-white text-2xl font-bold tracking-widest uppercase">
                Episode
            </div>

            <!-- Center Navigation (Hidden on mobile) -->
            <nav class="hidden md:flex space-x-8 text-white/90 font-medium text-sm">
                <a href="#" class="hover:text-white transition">Stay</a>
                <a href="#" class="hover:text-white transition">Offers</a>
                <a href="#" class="hover:text-white transition">Experience</a>
            </nav>

            <!-- Right Actions -->
            <div class="flex items-center space-x-6 text-sm font-medium">
                <a href="#" class="text-white hover:text-gray-200 hidden md:block">Sign In</a>
                <a href="#" class="bg-white text-black px-6 py-2.5 rounded-full hover:bg-gray-100 transition shadow-lg">
                    Check Rates
                </a>
            </div>
        </header>

        <!-- ================= HERO TEXT ================= -->
        <div class="relative z-10 flex flex-col items-center justify-center flex-grow text-center px-4 mb-20">
            <span class="text-yellow-400 font-semibold tracking-wider uppercase text-xs mb-4">The First Georgian Tech Hotel</span>
            <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tight mb-6 max-w-4xl">
                Seamless stays. <br> Powered by technology.
            </h1>
            <p class="text-lg md:text-xl text-gray-200 max-w-2xl font-light">
                Skip the front desk with self check-in kiosks. Discover modern comfort and meet our multilingual 3D AI concierge.
            </p>
        </div>

        <!-- ================= BOOKING WIDGET (Airbnb Style) ================= -->
        <div class="relative z-20 w-full max-w-4xl mx-auto px-4 pb-12">
            <div class="bg-white rounded-full shadow-2xl flex items-center justify-between p-2 divide-x divide-gray-200">
                
                <!-- Check In -->
                <button class="flex-1 px-6 py-2 text-left hover:bg-gray-50 rounded-l-full transition group">
                    <div class="text-xs font-bold uppercase tracking-wider text-gray-500 group-hover:text-gray-900">Check In</div>
                    <div class="text-gray-400 font-medium mt-1">Add dates</div>
                </button>

                <!-- Check Out -->
                <button class="flex-1 px-6 py-2 text-left hover:bg-gray-50 transition group">
                    <div class="text-xs font-bold uppercase tracking-wider text-gray-500 group-hover:text-gray-900">Check Out</div>
                    <div class="text-gray-400 font-medium mt-1">Add dates</div>
                </button>

                <!-- Guests -->
                <button class="flex-1 px-6 py-2 text-left hover:bg-gray-50 transition group">
                    <div class="text-xs font-bold uppercase tracking-wider text-gray-500 group-hover:text-gray-900">Guests</div>
                    <div class="text-gray-900 font-medium mt-1">1 Room, 2 Guests</div>
                </button>

                <!-- Search Button -->
                <div class="pl-4 pr-2">
                    <button class="bg-episode-green hover-episode-green text-white px-8 py-4 rounded-full font-semibold transition flex items-center space-x-2 shadow-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <span>Search Rooms</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= 3D AI CONCIERGE BADGE (Floating Bottom Right) ================= -->
        <div class="absolute bottom-10 right-10 z-30 hidden lg:flex items-center space-x-3 bg-black/60 backdrop-blur-md p-2 pr-5 rounded-full border border-white/10 shadow-2xl cursor-pointer hover:bg-black/80 transition">
            <!-- Simulated Avatar Core / Hologram Icon -->
            <div class="w-10 h-10 rounded-full bg-gradient-to-r from-blue-500 to-emerald-400 flex items-center justify-center animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <div class="flex flex-col">
                <span class="text-white text-xs font-bold uppercase tracking-wider">Meet AI Concierge</span>
                <span class="text-gray-300 text-xs">Speaks all languages</span>
            </div>
        </div>

    </main>

</body>
</html>
